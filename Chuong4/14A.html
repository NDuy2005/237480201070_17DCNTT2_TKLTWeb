<form name="form14A">
    Số hạng 1: <input type="text" name="SoHang1"> <br>
    Số hạng 2: <input type="text" name="SoHang2"> <br>
    Kết quả: <input type="text" name="KetQua"> <br>
    
    <input type="button" value="Cộng" onclick="tinhToan('+')">
    <input type="button" value="Trừ" onclick="tinhToan('-')">
    <input type="button" value="Nhân" onclick="tinhToan('*')">
    <input type="button" value="Chia" onclick="tinhToan('/')">
</form>

<script>
    function tinhToan(phepTinh) {
        var s1 = parseFloat(document.form14A.SoHang1.value);
        var s2 = parseFloat(document.form14A.SoHang2.value);
        var kq = 0;
        
        if(phepTinh == '+') kq = s1 + s2;
        if(phepTinh == '-') kq = s1 - s2;
        if(phepTinh == '*') kq = s1 * s2;
        if(phepTinh == '/') kq = s1 / s2;
        
        document.form14A.KetQua.value = kq;
    }
</script>
