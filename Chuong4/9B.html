<h3>Bài 9B: Lọc thiết bị Computer</h3>
<input type="button" value="Nhập thiết bị" onclick="locThietBi()">
<div id="ketqua9b"></div>
<script>
    function locThietBi() {
        var n = prompt("Nhập số lượng thiết bị:", 3);
        var thietbi = [];
        for(var i=0; i<n; i++){
            thietbi[i] = prompt("Nhập tên thiết bị thứ " + (i+1) + ":", "");
        }
        
        var html = "<table border='1'><tr><th>Tên thiết bị</th></tr>";
        for(var i=0; i<n; i++){
            if(thietbi[i].trim().toLowerCase() === "computer"){
                html += "<tr><td>" + thietbi[i] + "</td></tr>";
            }
        }
        html += "</table>";
        document.getElementById("ketqua9b").innerHTML = html;
    }
</script>
