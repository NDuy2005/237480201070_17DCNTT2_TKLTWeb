<h3>Bài 9A: Sắp xếp tên</h3>
<input type="button" value="Nhập và sắp xếp tên" onclick="sapXepTen()">
<script>
    function sapXepTen() {
        var soLuong = prompt("Bạn cần nhập bao nhiêu người?", 3);
        var ds = new Array();
        for (var i = 0; i < soLuong; i++) {
            ds[i] = prompt("Nhập họ tên người thứ " + (i+1) + ":", "");
        }
        ds.sort();
        document.write("<h4>Danh sách đã sắp xếp:</h4>");
        for (var x in ds) {
            document.write(ds[x] + "<br>");
        }
    }
</script>
