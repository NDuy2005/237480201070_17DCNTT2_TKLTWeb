<form name="form18A">
    <textarea name="NoiDung" cols="50" rows="5" onkeyup="kiemTraKyTu()"></textarea>
    <br>
    Số ký tự đã gõ: <input type="text" name="SoKyTu" readonly>
</form>

<script>
    function kiemTraKyTu() {
        var doDai = document.form18A.NoiDung.value.length;
        document.form18A.SoKyTu.value = doDai;
        
        if (doDai > 200) {
            alert("Bạn đã gõ quá số ký tự cho phép!");
        }
    }
</script>
