<form name="form20C">
    <h3>Tính lương nhân viên</h3>
    Họ tên (HoTen): <input type="text" name="HoTen"> <br>
    Năm vào làm (NamVaoLam): <input type="text" name="NamVaoLam"> <br>
    Hệ số (HeSo): <input type="text" name="HeSo"> <br>
    Lương cơ sở (LuongCoSo): <input type="text" name="LuongCoSo"> <br>
    <br>
    <input type="button" name="TinhLuongTinh" value="Tính Lương" onclick="tinhLuongNV()">
    <br><br>
    Lương cơ bản (LuongCoBan): <input type="text" name="LuongCoBan"> <br>
    Phụ cấp (PhuCap): <input type="text" name="PhuCap"> <br>
    Thâm niên (ThamNien): <input type="text" name="ThamNien"> <br>
    Thành tiền (ThanhTien): <input type="text" name="ThanhTien">
</form>

<script>
    function tinhLuongNV() {
        var f = document.form20C;
        var heSo = parseFloat(f.HeSo.value);
        var luongCoSo = parseFloat(f.LuongCoSo.value);
        var namVaoLam = parseInt(f.NamVaoLam.value);
        var namHienTai = new Date().getFullYear();

        // Công thức tính
        var luongCB = heSo * luongCoSo;
        var phuCap = 0.25 * luongCB; // 25% lương cơ bản
        var thamNien = namHienTai - namVaoLam;
        var thanhTien = luongCB + phuCap; // Đề bài ghi ThanhTien = LuongCoBan + PhuCap

        // Gán giá trị vào ô kết quả
        f.LuongCoBan.value = luongCB;
        f.PhuCap.value = phuCap;
        f.ThamNien.value = thamNien;
        f.ThanhTien.value = thanhTien;
    }
</script>
