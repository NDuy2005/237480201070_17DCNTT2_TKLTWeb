<!DOCTYPE html>
<html>
<head>
    <title>Bài tập 2A</title>
</head>
<body>
    <script>
        // Tạo tiêu đề bằng Script như đề bài
        document.write("<h1>Tạo Button bằng Script</h1><br>");
        
        // Hàm xử lý thông báo
        function thongbao(txt) {
            alert(txt);
        }
    </script>

    <form>
        <input type="button" name="callthongbao" value="Thông báo" onclick="thongbao('Welcome to javascript!')">
    </form>
</body>
</html>
