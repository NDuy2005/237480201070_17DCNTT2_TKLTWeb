<form name="form14B">
    Số hạng 1: <input type="text" name="SoHang1"> <br>
    Số hạng 2: <input type="text" name="SoHang2"> <br>
    
    Phép tính:
    <input type="radio" name="PhepTinh" value="+" checked> Cộng
    <input type="radio" name="PhepTinh" value="-"> Trừ
    <input type="radio" name="PhepTinh" value="*"> Nhân
    <input type="radio" name="PhepTinh" value="/"> Chia
    <br>
    
    <input type="button" name="Tinh" value="Tính" onclick="thucHienTinh()"> <br>
    Kết quả: <input type="text" name="KetQua">
</form>

<script>
    function thucHienTinh() {
        var s1 = parseFloat(document.form14B.SoHang1.value);
        var s2 = parseFloat(document.form14B.SoHang2.value);
        var phepTinh = document.querySelector('input[name="PhepTinh"]:checked').value;
        var kq = 0;

        if(phepTinh == '+') kq = s1 + s2;
        if(phepTinh == '-') kq = s1 - s2;
        if(phepTinh == '*') kq = s1 * s2;
        if(phepTinh == '/') kq = s1 / s2;

        document.form14B.KetQua.value = kq;
    }
</script>
