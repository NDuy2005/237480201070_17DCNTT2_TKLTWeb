<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form name="form20A">
    Số lượng: <input type="text" name="SoLuong" onkeyup="tinhTien()"> <br>
    Đơn giá: <input type="text" name="DonGia" onkeyup="tinhTien()"> <br>
    Thành tiền: <input type="text" name="ThanhTien" readonly>
</form>

<script>
    function tinhTien() {
        var sl = document.form20A.SoLuong.value;
        var dg = document.form20A.DonGia.value;
        // Chỉ tính khi cả 2 ô đều có dữ liệu
        if(sl != "" && dg != "") {
            document.form20A.ThanhTien.value = parseFloat(sl) * parseFloat(dg);
        }
    }
</script>
</body>
</html>
