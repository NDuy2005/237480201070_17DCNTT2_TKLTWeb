<form name="form21C">
    Số 01: <input type="text" name="So01"> <br>
    Số 02: <input type="text" name="So02"> <br>
    Phép tính: 
    <select name="PhepTinh">
        <option value="+">Cộng</option>
        <option value="-">Trừ</option>
        <option value="*">Nhân</option>
        <option value="/">Chia</option>
    </select>
    <input type="button" name="Tinh" value="Tính" onclick="tinh21C()"> <br>
    Kết quả: <input type="text" name="Ketqua">
</form>

<script>
    function tinh21C() {
        var a = parseFloat(document.form21C.So01.value);
        var b = parseFloat(document.form21C.So02.value);
        var op = document.form21C.PhepTinh.value;
        
        // Sử dụng switch case hoặc if
        if(op == '+') document.form21C.Ketqua.value = a + b;
        if(op == '-') document.form21C.Ketqua.value = a - b;
        if(op == '*') document.form21C.Ketqua.value = a * b;
        if(op == '/') document.form21C.Ketqua.value = a / b;
    }
</script>
