<!DOCTYPE html>
<html>
<head>
<style>
/* --- CSS chung --- */
body { margin: 0; padding: 0; font-family: Arial, sans-serif; }

/* --- Cấu trúc Menu Ngang --- */
ul.topnav {
  list-style-type: none;
  margin: 0;
  padding: 0;
  overflow: visible; 
  background-color: #333333;
}

/* === [QUAN TRỌNG] ĐOẠN CODE SỬA LỖI MẤT THANH MENU === */
/* Đoạn này giúp thanh menu tự động giãn ra để ôm lấy các nút bên trong */
ul.topnav::after {
  content: "";
  clear: both;
  display: table;
}
/* ==================================================== */

ul.topnav > li {
  float: left;
}

ul.topnav > li > a, .dropbtn {
  display: block;
  color: white;
  text-align: center;
  padding: 14px 16px;
  text-decoration: none;
}

ul.topnav > li > a:hover, .dropdown:hover .dropbtn {
  background-color: #111111;
}

/* --- Cấu trúc Menu Sổ Xuống --- */
.dropdown {
  float: left;
}

.dropdown .dropbtn {
  font-size: 16px;  
  border: none;
  outline: none;
  color: white;
  padding: 14px 16px;
  background-color: inherit;
  font-family: inherit;
  margin: 0;
  cursor: pointer;
}

.dropdown-content {
  display: none;
  position: absolute;
  background-color: #f1f1f1;
  min-width: 160px;
  box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
  z-index: 1;
}

.dropdown-content a {
  float: none;
  color: black;
  padding: 12px 16px;
  text-decoration: none;
  display: block;
  text-align: left;
}

.dropdown-content a:hover {
  background-color: #ddd;
}

.dropdown:hover .dropdown-content {
  display: block;
}
</style>
</head>
<body>

<ul class="topnav">
  <li><a href="#home">Home</a></li>
  <li><a href="#news">News</a></li>
  
  <li class="dropdown">
    <a href="javascript:void(0)" class="dropbtn">Services &#9662;</a>
    <div class="dropdown-content">
      <a href="#design">Web Design</a>
      <a href="#marketing">Marketing</a>
      <a href="#seo">SEO Tools</a>
    </div>
  </li>
  
  <li><a href="#contact">Contact</a></li>
  <li><a href="#about">About</a></li>
</ul>

<div style="padding:20px">
  <h2>Kết hợp Menu Ngang và Dọc</h2>
  
</div>

</body>
</html>
