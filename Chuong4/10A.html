<html>
<head>
    <title>Minh họa đưa câu lệnh JavaScript vào các phần tử</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
</head>
<body>

    <input type="button" name="DangKy" value="Đăng ký" onClick="alert('Dang ky E-Mail');">
    <br><br>

    <input type="button" value="Hiện Hello World" onClick="alert('Hello world');">
    <br><br>

    <input type="button" value="Viết nội dung mới" onClick="document.write('Welcome to JavaScript');">
    <br><br>

    <input type="button" value="Tính tổng 10 + 20" onClick="var x,y; x=10; y=20; alert('Tổng là : ' + (x+y));">

</body>
</html>
