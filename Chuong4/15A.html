<form name="form15A">
    Màu nền (MauNen): <input type="text" name="MauNen" value="yellow"> <br>
    Màu chữ (MauChu): <input type="text" name="MauChu" value="red"> <br>
    Tiêu đề (TieuDe): <input type="text" name="TieuDe" value="Tiêu đề mới"> <br>
    Trạng thái (TrangThai): <input type="text" name="TrangThai" value="Hello"> <br>
    
    <input type="button" name="ThayDoi" value="Thay đổi" onclick="capNhat()">
</form>

<script>
    function capNhat() {
        document.bgColor = document.form15A.MauNen.value;
        document.fgColor = document.form15A.MauChu.value;
        document.title = document.form15A.TieuDe.value;
        window.status = document.form15A.TrangThai.value; 
    }
</script>
