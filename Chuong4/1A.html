<!DOCTYPE html>
<html>
<head>
    <title>Bài tập 1A</title>
</head>
<body>
    <script>
        // Khai báo biến
        var Ten, Tuoi;
        
        // Nhập liệu từ người dùng
        Ten = prompt("Bạn hãy nhập vào tên: ", "");
        Tuoi = prompt("Bạn hãy nhập vào Tuổi: ", 20);
        
        // Xuất ra màn hình với định dạng
        document.write("Chào bạn: <b>" + Ten + "</b><br>"); // In đậm tên
        document.write("Tuổi của bạn là: <u>" + Tuoi + "</u>"); // Gạch chân tuổi
    </script>
</body>
</html>
